<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatRoom</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="chat-page">
  <div class="chat-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-brand">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <rect x="2" y="3" width="22" height="16" rx="3.5" fill="url(#sb)"/>
            <circle cx="9" cy="11" r="2" fill="rgba(255,255,255,0.9)"/>
            <circle cx="13" cy="11" r="2" fill="rgba(255,255,255,0.9)"/>
            <circle cx="17" cy="11" r="2" fill="rgba(255,255,255,0.9)"/>
            <path d="M10 19l3 4 3-4" fill="url(#sb2)"/>
            <defs>
              <linearGradient id="sb" x1="2" y1="3" x2="24" y2="19" gradientUnits="userSpaceOnUse"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
              <linearGradient id="sb2" x1="10" y1="19" x2="16" y2="23" gradientUnits="userSpaceOnUse"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
            </defs>
          </svg>
          <span>ChatRoom</span>
        </div>
        <button class="close-btn" id="sidebar-close">✕</button>
      </div>

      <!-- 房间信息 -->
      <div class="room-card">
        <div class="room-card-label" data-i18n="roomLabel">房间</div>
        <div class="room-card-row">
          <span class="room-code" id="room-id-display">------</span>
          <button class="icon-btn" id="copy-btn" title="copy">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="4.5" y="4.5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M2.5 10.5v-8a1 1 0 011-1h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div id="copy-tip" class="copy-tip hidden" data-i18n="copied">已复制 ✓</div>
      </div>

      <!-- 成员 -->
      <div class="members-card">
        <div class="members-head">
          <span data-i18n="members">在线成员</span>
          <span id="user-count" class="badge">0</span>
        </div>
        <ul id="user-list" class="user-list"></ul>
      </div>

      <button class="leave-btn" id="leave-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M11 11l4-4-4-4M15 7H5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span data-i18n="leaveRoom">退出房间</span>
      </button>
    </aside>

    <!-- 遮罩 -->
    <div class="overlay" id="overlay"></div>

    <!-- 主区域 -->
    <main class="chat-main">
      <!-- 顶栏 -->
      <div class="topbar">
        <button class="menu-btn" id="menu-btn">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 6h14M3 10h14M3 14h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <div class="topbar-mid">
          <span class="topbar-room-label" data-i18n="roomLabel">房间</span>
          <span class="topbar-room-id" id="topbar-room-id">------</span>
        </div>
        <div class="topbar-right">
          <span class="green-dot"></span>
          <span id="online-count" class="online-count">0</span>
        </div>
      </div>

      <!-- 消息区 -->
      <div class="messages" id="messages">
        <div class="welcome-block" id="welcome-block">
          <div class="welcome-emoji">💬</div>
          <div class="welcome-title" data-i18n="welcomeTitle">欢迎来到聊天室</div>
          <div class="welcome-hint" data-i18n="welcomeHint">分享房间号邀请好友加入</div>
        </div>
      </div>

      <!-- 输入区 -->
      <div class="input-zone">
        <!-- 图片上传按钮 -->
        <label class="img-upload-btn" id="img-btn" title="发送图片">
          <input type="file" accept="image/*" id="img-input" style="display:none" />
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <rect x="2" y="4" width="18" height="14" rx="3" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="7.5" cy="9.5" r="1.5" fill="currentColor"/>
            <path d="M2 15l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </label>
        <div class="input-box">
          <input type="text" id="msg-input" maxlength="500" autocomplete="off" data-i18n-ph="inputPh" placeholder="输入消息..." />
          <button class="send-btn" id="send-btn">
            <svg width="19" height="19" viewBox="0 0 19 19" fill="none">
              <path d="M2 9.5L17 2l-7 15-2-5.5L2 9.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- 图片预览上传中 -->
      <div class="upload-preview" id="upload-preview" style="display:none">
        <div class="preview-inner">
          <img id="preview-img" src="" alt="preview" />
          <div class="preview-actions">
            <button class="preview-cancel" id="preview-cancel">✕ 取消</button>
            <button class="preview-send" id="preview-send">发送图片</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 图片灯箱 -->
  <div class="lightbox" id="lightbox" style="display:none">
    <div class="lightbox-bg" id="lightbox-bg"></div>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="i18n.js"></script>
  <script src="chat.js"></script>
</body>
</html>
