<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatRoom</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-decor">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas class="particles" id="particles"></canvas>
  </div>

  <!-- 语言切换 -->
  <div class="lang-bar">
    <div class="lang-selector" id="lang-selector">
      <button class="lang-current" id="lang-btn">
        <span id="lang-flag">🇨🇳</span>
        <span id="lang-name">简体中文</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="lang-dropdown" id="lang-dropdown"></div>
    </div>
  </div>

  <div class="home-wrap">
    <!-- Hero -->
    <div class="hero">
      <div class="logo-anim">
        <div class="logo-glow"></div>
        <div class="logo-icon-wrap">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
            <rect x="3" y="6" width="38" height="26" rx="5" fill="url(#lg)"/>
            <circle cx="15" cy="19" r="3" fill="rgba(255,255,255,0.9)"/>
            <circle cx="22" cy="19" r="3" fill="rgba(255,255,255,0.9)"/>
            <circle cx="29" cy="19" r="3" fill="rgba(255,255,255,0.9)"/>
            <path d="M16 32l6 6 6-6" fill="url(#lg2)"/>
            <defs>
              <linearGradient id="lg" x1="3" y1="6" x2="41" y2="32" gradientUnits="userSpaceOnUse">
                <stop stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/>
              </linearGradient>
              <linearGradient id="lg2" x1="16" y1="32" x2="28" y2="38" gradientUnits="userSpaceOnUse">
                <stop stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>
      <h1 class="hero-title" data-i18n="appName">ChatRoom</h1>
      <p class="hero-desc" data-i18n="appDesc">创建或加入房间，和朋友实时畅聊</p>
    </div>

    <!-- 卡片 -->
    <div class="glass-card">
      <!-- 昵称 -->
      <div class="field">
        <label class="field-label">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 13.5c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span data-i18n="nickname">你的昵称</span>
        </label>
        <input class="fancy-input" type="text" id="username" maxlength="16" autocomplete="off" data-i18n-ph="nicknamePh" placeholder="输入你的昵称..." />
      </div>

      <!-- Tab -->
      <div class="tab-bar">
        <button class="tab active" data-tab="create">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2v11M2 7.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span data-i18n="createRoom">创建房间</span>
        </button>
        <button class="tab" data-tab="join">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M4.5 2.5l6 5-6 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span data-i18n="joinRoom">加入房间</span>
        </button>
      </div>

      <!-- 创建面板 -->
      <div class="tab-panel active" id="create-panel">
        <div class="field">
          <label class="field-label">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="2" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M4 6h7M4 9h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            <span data-i18n="customRoomId">自定义房间号</span>
            <em class="hint" data-i18n="customRoomIdHint">（选填，留空自动生成）</em>
          </label>
          <input class="fancy-input mono" type="text" id="custom-room-id" maxlength="20" autocomplete="off"
            style="text-transform:uppercase" data-i18n-ph="customRoomIdPh" placeholder="如: MYROOM，留空自动生成..." />
        </div>
        <button class="cta-btn primary" id="create-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v14M2 9h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          <span data-i18n="createBtn">创建新房间</span>
        </button>
      </div>

      <!-- 加入面板 -->
      <div class="tab-panel" id="join-panel">
        <div class="field">
          <label class="field-label">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="2" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M4 6h7M4 9h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            <span data-i18n="roomIdLabel">房间号</span>
          </label>
          <div class="input-row">
            <span class="input-prefix">#</span>
            <input class="fancy-input mono no-left-radius" type="text" id="join-room-id" maxlength="20"
              autocomplete="off" style="text-transform:uppercase" data-i18n-ph="roomIdPh" placeholder="输入房间号..." />
          </div>
        </div>
        <button class="cta-btn secondary" id="join-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M5 2l9 7-9 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span data-i18n="joinBtn">加入房间</span>
        </button>
      </div>

      <!-- 错误 -->
      <div id="err" class="err-toast hidden"></div>
    </div>

    <p class="tagline" data-i18n="tagline">无需注册 · 即开即用 · 跨网络聊天</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="i18n.js"></script>
  <script>
    // ===== 语言 =====
    let lang = localStorage.getItem('lang') || 'zh-CN';
    const t = () => i18n[lang];

    function applyLang() {
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n;
        if (t()[k] !== undefined) el.textContent = t()[k];
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const k = el.dataset.i18nPh;
        if (t()[k] !== undefined) el.placeholder = t()[k];
      });
      document.getElementById('lang-flag').textContent = t().flag;
      document.getElementById('lang-name').textContent = t().name;
    }

    function buildLangDropdown() {
      const dd = document.getElementById('lang-dropdown');
      dd.innerHTML = '';
      Object.entries(i18n).forEach(([code, data]) => {
        const btn = document.createElement('button');
        btn.className = 'lang-item' + (code === lang ? ' active' : '');
        btn.innerHTML = `<span>${data.flag}</span><span>${data.name}</span>`;
        btn.addEventListener('click', () => {
          lang = code;
          localStorage.setItem('lang', lang);
          applyLang();
          buildLangDropdown();
          dd.classList.remove('open');
        });
        dd.appendChild(btn);
      });
    }

    document.getElementById('lang-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('lang-dropdown').classList.toggle('open');
    });
    document.addEventListener('click', () => document.getElementById('lang-dropdown').classList.remove('open'));

    buildLangDropdown();
    applyLang();

    // ===== 粒子背景 =====
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let pts = [];
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    function initParticles() {
      pts = Array.from({ length: 50 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 0.5,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        alpha: Math.random() * 0.5 + 0.1,
      }));
    }
    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(130,140,255,${p.alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(drawParticles);
    }
    resizeCanvas(); initParticles(); drawParticles();
    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

    // ===== Socket =====
    const socket = io();

    const usernameEl = document.getElementById('username');
    const customRoomIdEl = document.getElementById('custom-room-id');
    const joinRoomIdEl = document.getElementById('join-room-id');
    const errEl = document.getElementById('err');
    let errTimer;

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.classList.remove('hidden', 'err-hide');
      errEl.classList.add('err-show');
      clearTimeout(errTimer);
      errTimer = setTimeout(() => errEl.classList.add('hidden'), 3500);
    }

    const errMap = {
      ROOM_ID_INVALID: () => t().errorRoomIdInvalid,
      ROOM_ID_TAKEN: () => t().errorRoomIdTaken,
      ROOM_NOT_FOUND: () => t().errorRoomNotFound,
      NAME_TAKEN: () => t().errorNameTaken,
    };

    function getErr(code) { return errMap[code] ? errMap[code]() : code; }
    function getUsername() {
      const v = usernameEl.value.trim();
      if (!v) { showErr(t().errorNickname); usernameEl.focus(); return null; }
      return v;
    }

    // Tab
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
      });
    });

    // 创建
    document.getElementById('create-btn').addEventListener('click', () => {
      const username = getUsername(); if (!username) return;
      const customRoomId = customRoomIdEl.value.trim();
      socket.emit('create-room', { username, customRoomId }, ({ roomId, error }) => {
        if (error) return showErr(getErr(error));
        socket.emit('join-room', { roomId, username }, ({ success, users, error: e }) => {
          if (e) return showErr(getErr(e));
          sessionStorage.setItem('username', username);
          sessionStorage.setItem('roomId', roomId);
          sessionStorage.setItem('users', JSON.stringify(users));
          sessionStorage.setItem('lang', lang);
          window.location.href = 'chat.html';
        });
      });
    });

    // 加入
    document.getElementById('join-btn').addEventListener('click', () => {
      const username = getUsername(); if (!username) return;
      const code = joinRoomIdEl.value.trim().toUpperCase();
      if (!code) return showErr(t().errorRoomIdEmpty);
      socket.emit('join-room', { roomId: code, username }, ({ success, users, error }) => {
        if (error) return showErr(getErr(error));
        sessionStorage.setItem('username', username);
        sessionStorage.setItem('roomId', code);
        sessionStorage.setItem('users', JSON.stringify(users));
        sessionStorage.setItem('lang', lang);
        window.location.href = 'chat.html';
      });
    });

    [usernameEl, customRoomIdEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('create-btn').click(); }));
    joinRoomIdEl.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('join-btn').click(); });
  </script>
</body>
</html>
